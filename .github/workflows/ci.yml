name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
        
      - name: Lint
        run: bun run lint
        
      - name: Typecheck
        run: bun run typecheck
        
      - name: Unit Tests
        run: bun run test
        
      # Nota: Para correr los test de Firestore Rules en CI, necesitas arrancar el emulador
      # con la CLI de Firebase en este paso. Lo dejamos listo para cuando lo configures.
      # - name: Firestore Rules Tests
      #   run: |
      #     npm i -g firebase-tools
      #     firebase emulators:exec --only firestore "bun run test:rules"

  e2e:
    runs-on: ubuntu-latest
    needs: lint-type-test
    steps:
      - uses: actions/checkout@v4
      
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
          
      - name: Install dependencies
        run: bun install --frozen-lockfile
        
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium
        
      - name: Build App
        run: bun run build
        
      - name: Run E2E Tests
        run: bun run test:e2e
        
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
